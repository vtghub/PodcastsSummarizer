name: Backfill Episode Published Dates

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: "Single source ID to backfill (leave empty to backfill all sources)"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          STORAGE_PROVIDER: supabase
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONUTF8: "1"
        run: |
          if [ -n "${{ inputs.source_id }}" ]; then
            python -m worker.jobs.backfill_published_at --source-id "${{ inputs.source_id }}"
          else
            python -m worker.jobs.backfill_published_at
          fi
