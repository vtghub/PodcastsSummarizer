name: Seed Dictionary
# One-time (idempotent — safe to re-run) job: loads the Princeton WordNet
# English lexical database into Supabase's dictionary_entries table
# (migration 022) for the insight card word-lookup feature.

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed dictionary_entries
        env:
          STORAGE_PROVIDER: supabase
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONUTF8: "1"
          PYTHONUNBUFFERED: "1"
        run: python -m worker.jobs.seed_dictionary
