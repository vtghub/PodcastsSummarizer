name: Daily Podcast Pipeline
# Runs daily at 07:00 UTC; also triggerable manually via workflow_dispatch.

on:
  schedule:
    - cron: "0 0 * * *"   # 7:00 PM EST daily (midnight UTC)
  workflow_dispatch:        # allow manual trigger from Actions tab
    inputs:
      since_days:
        description: "Look back N days for episodes"
        required: false
        default: "1"
      force_email:
        description: "Send digest from existing DB insights even if no new episodes processed"
        required: false
        default: "false"
      episode_audio_url:
        description: "Single-episode mode: audio URL of the specific episode to process"
        required: false
        default: ""
      source_id:
        description: "Single-episode mode: source ID the episode belongs to"
        required: false
        default: ""
      target_email:
        description: "Single-episode mode: email address to send the targeted digest to"
        required: false
        default: ""

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install system deps (ffmpeg for Whisper)
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-tiny-${{ runner.os }}

      - name: Run pipeline
        env:
          STORAGE_PROVIDER: supabase
          LLM_PROVIDER: ${{ secrets.GROQ_API_KEY != '' && 'groq' || 'gemini' }}
          TRANSCRIPTION_PROVIDER: local_whisper
          EMAIL_PROVIDER: gmail_smtp
          WHISPER_MODEL: tiny
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          LISTEN_NOTES_API_KEY: ${{ secrets.LISTEN_NOTES_API_KEY }}
          TADDY_API_KEY: ${{ secrets.TADDY_API_KEY }}
          TADDY_USER_ID: ${{ secrets.TADDY_USER_ID }}
          SINCE_DAYS: ${{ github.event.inputs.since_days || '1' }}
          FORCE_EMAIL: ${{ github.event.inputs.force_email || 'false' }}
          EPISODE_AUDIO_URL: ${{ github.event.inputs.episode_audio_url || '' }}
          EPISODE_SOURCE_ID: ${{ github.event.inputs.source_id || '' }}
          TARGET_EMAIL: ${{ github.event.inputs.target_email || '' }}
          PYTHONUTF8: "1"
        run: |
          python - <<'EOF'
          import sys, os
          from datetime import datetime, timezone, timedelta
          sys.path.insert(0, '.')

          episode_audio_url = os.environ.get("EPISODE_AUDIO_URL", "").strip()
          source_id         = os.environ.get("EPISODE_SOURCE_ID", "").strip()
          target_email      = os.environ.get("TARGET_EMAIL", "").strip()

          if episode_audio_url and source_id:
              # Single-episode on-demand mode
              from worker.jobs.pipeline import run_single_episode
              print(f"Single-episode mode | source={source_id} | target={target_email or 'none'}")
              result = run_single_episode(episode_audio_url, source_id, user_email=target_email)
              print(f"Done: {result}")
              if result.get("error"):
                  sys.exit(1)
          else:
              # Full daily pipeline
              from worker.jobs.pipeline import run_pipeline
              since_days = int(os.environ.get("SINCE_DAYS", "1"))
              since = datetime.now(timezone.utc) - timedelta(days=since_days)
              print(f"Running pipeline | since={since.date()} | storage=supabase | llm=gemini")
              force_email = os.environ.get("FORCE_EMAIL", "false").lower() == "true"
              stats = run_pipeline(since=since, send_email=True, force_email=force_email)
              print(f"Done: {stats}")
              if stats.get("errors"):
                  sys.exit(1)
          EOF

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: data/logs/
          if-no-files-found: ignore
          retention-days: 7
