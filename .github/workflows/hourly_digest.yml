name: Hourly Digest Fan-out
# Runs every hour and sends digest emails to users whose preferred send hour
# (in their chosen timezone) matches the current hour. Ingestion is NOT done
# here — that is handled by daily_pipeline.yml at 06:00 UTC.

on:
  schedule:
    - cron: "0 * * * *"   # every hour, on the hour
  workflow_dispatch:        # allow manual trigger for testing
    inputs:
      date:
        description: "Date to send digest for (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""
      force:
        description: "Skip the hour check and send to all eligible users immediately (true/false)."
        required: false
        default: "false"
      target_email:
        description: "Only send to this email address (leave blank for all users)."
        required: false
        default: ""

jobs:
  send-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run digest fan-out
        env:
          STORAGE_PROVIDER: supabase
          EMAIL_PROVIDER: gmail_smtp
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_DATE: ${{ github.event.inputs.date || '' }}
          DIGEST_FORCE: ${{ github.event.inputs.force || 'false' }}
          DIGEST_TARGET_EMAIL: ${{ github.event.inputs.target_email || '' }}
          PYTHONUTF8: "1"
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, '.')
          from worker.jobs.pipeline import run_digest_fanout

          date_str = os.environ.get("DIGEST_DATE", "").strip() or None
          force = os.environ.get("DIGEST_FORCE", "false").lower() == "true"
          target_email = os.environ.get("DIGEST_TARGET_EMAIL", "").strip() or None
          run_digest_fanout(date_str, force=force, target_email=target_email)
          EOF
